<!DOCTYPE html>
<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
  <head>
    <title>Web Tech's First Virtual Asynchronous Museum</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
  <body>
    <header>
      <h1>Web Tech's First Virtual Asynchronous Museum</h1>
      <input placeholder="insert keywords here" type="text" id="keywords">
      <button id="new_artwork" onclick="getArtwork()">Show random artwork</button>
    </header>
    <main>
      <img id="artwork_image" src="" alt="artwork to show">
      <table>
        <tr>
          <th>Title:</th><td id="artwork_title"></td>
        </tr>
        <tr>
          <th>Artist:</th><td id="artwork_artist"></td>
        </tr>
      </table>
    </main>
    <footer>
      Web Technologies, Spring 2024 - &copy; <a href="https://www.artic.edu">The Art Institute of Chicago</a> 
    </footer>
  </body>
</html>
